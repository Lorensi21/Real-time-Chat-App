name: Platform CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven' # Automatically caches ~/.m2 dependencies to drastically speed up subsequent builds

      - name: Boot Infrastructure (Redis & Cassandra)
        # Spins up the containers in detached mode so the integration tests have active databases to connect to
        run: docker compose -f docker/docker-compose.yml up -d

      - name: Wait for Cassandra to Initialize
        # Cassandra takes several seconds to boot. We must delay the Maven build until the healthcheck passes.
        run: |
          echo "Waiting for Cassandra to be healthy..."
          while [ "$(docker inspect --format='{{json .State.Health.Status}}' chat-cassandra)" != "\"healthy\"" ]; do
            sleep 5
            echo "Still waiting..."
          done
          echo "Cassandra is up and healthy!"

      - name: Execute Maven Build & Tests
        # Compiles the code, runs unit/integration tests, and packages the artifacts
        run: mvn clean verify

      - name: Tear Down Infrastructure
        if: always() # Ensures containers are destroyed even if the Maven build fails, freeing runner resources
        run: docker compose -f docker/docker-compose.yml down