version: '3.8'

services:
  redis-node:
    image: redis:7-alpine
    container_name: chat-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - chat-network

  cassandra-node:
    image: cassandra:4.1
    container_name: chat-cassandra
    ports:
      - "9042:9042"
    environment:
      - CASSANDRA_CLUSTER_NAME=ChatCluster
      - CASSANDRA_DC=datacenter1
      - CASSANDRA_ENDPOINT_SNITCH=GossipingPropertyFileSnitch
      - HEAP_NEWSIZE=128M
      - MAX_HEAP_SIZE=1024M
    volumes:
      - cassandra_data:/var/lib/cassandra
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'describe cluster'"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - chat-network

  connection-node:
    build:
      context: ../
      dockerfile: chat-connection-node/Dockerfile
    container_name: chat-connection
    ports:
      - "8081:8081"
    environment:
      # Override the default Spring profile to bind to the Docker network instead of localhost
      - SPRING_PROFILES_ACTIVE=local
      - SPRING_DATA_REDIS_HOST=redis-node
    depends_on:
      redis-node:
        condition: service_healthy
    networks:
      - chat-network

  persistence-node:
    build:
      context: ../
      dockerfile: chat-persistence-node/Dockerfile
    container_name: chat-persistence
    ports:
      - "8090:8090"
    environment:
      - SPRING_PROFILES_ACTIVE=local
      - SPRING_DATA_REDIS_HOST=redis-node
      - SPRING_DATA_CASSANDRA_CONTACT_POINTS=cassandra-node
    depends_on:
      redis-node:
        condition: service_healthy
      cassandra-node:
        condition: service_healthy
    networks:
      - chat-network

volumes:
  redis_data:
  cassandra_data:

networks:
  chat-network:
    driver: bridge